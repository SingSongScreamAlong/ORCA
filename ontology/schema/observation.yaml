version: "0.1"
object: Observation
summary: >
  The foundational object. A single recorded fact, attributed to a source and a
  collector, at a point in time. Observations are append-only.

properties:
  id:           { type: uuid, required: true, system_set: true }
  timestamp:    { type: datetime, required: true, note: "When the fact was observed (collector-supplied)." }
  source:       { type: uuid, required: true, ref: Source }
  collector:    { type: string, required: true, note: "Analyst id or collector name." }
  location:     { type: string, required: false, note: "Geo or place where observed." }
  notes:        { type: text, required: false }
  confidence:   { type: float, required: true, range: [0.0, 1.0] }
  evidence_ids: { type: array, items: uuid, required: false, ref: Evidence }

relationships:
  references_entity:      { target: Entity, cardinality: many }
  part_of_case:           { target: Case, cardinality: many }
  supported_by_evidence:  { target: Evidence, cardinality: many }

invariants:
  - An Observation must reference exactly one Source.
  - An Observation is append-only; corrections are new observations referencing the prior one.
  - Confidence is within [0.0, 1.0].
